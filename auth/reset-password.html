<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — FitCore ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/tabler-icons/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--bg2:#0e1118;--bg3:#151b28;
  --blue:#3b82f6;--cyan:#22d3ee;--green:#34d399;--red:#f87171;
  --text:#e8edf8;--text2:#8494b0;--text3:#3d4f6a;
  --border:rgba(255,255,255,0.065);--border2:rgba(59,130,246,0.22);
  --card2:rgba(59,130,246,0.07);--r:12px;--r2:18px;
}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:2rem 1.25rem;position:relative;overflow-x:hidden;overflow-y:auto;
}
.orb1{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.12) 0%,transparent 70%);top:-200px;right:-200px;pointer-events:none}
.orb2{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(34,211,238,0.08) 0%,transparent 70%);bottom:-100px;left:-100px;pointer-events:none}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:56px 56px;pointer-events:none}

/* ── ANIMATIONS ──────────────────────────────── */
@keyframes fade-slide-up {
  from {
    opacity: 0;
    transform: translateY(30px) scale(0.98);
    filter: blur(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}
@keyframes fade-in {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.card {
  position:relative;z-index:1;
  width:100%;max-width:420px;
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);
  padding:2.5rem;
  overflow:hidden;
  animation: fade-slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.card:hover {
  border-color: rgba(59, 130, 246, 0.3);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(59, 130, 246, 0.1);
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--r2);
  background: radial-gradient(
    250px circle at var(--mouse-x, 0px) var(--mouse-y, 0px),
    rgba(59, 130, 246, 0.15),
    transparent 80%
  );
  z-index: 0;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.card:hover::before {
  opacity: 1;
}
.card > * {
  position: relative;
  z-index: 1;
}

/* Staggered Content Animation */
.logo, .icon-circle, .title, .sub, .form-group, .btn-submit, .back-link, #successView > * {
  opacity: 0;
  transform: translateY(15px);
  animation: fade-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.logo { animation-delay: 0.1s; }
.icon-circle { animation-delay: 0.2s; }
.title { animation-delay: 0.28s; }
.sub { animation-delay: 0.34s; }
.form-group:nth-of-type(1) { animation-delay: 0.4s; }
.form-group:nth-of-type(2) { animation-delay: 0.46s; }
.btn-submit { animation-delay: 0.52s; }
.back-link { animation-delay: 0.58s; }
.logo{display:flex;align-items:center;gap:0.65rem;margin-bottom:2rem;justify-content:center}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;color:#fff}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;background:linear-gradient(135deg,var(--text),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.icon-circle{
  width:64px;height:64px;border-radius:50%;
  background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;margin:0 auto 1.5rem;
}
.title{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:-0.03em;text-align:center;margin-bottom:0.5rem}
.sub{font-size:0.875rem;color:var(--text2);text-align:center;margin-bottom:2rem;line-height:1.6}

.form-group{margin-bottom:1.1rem}
.form-label{display:block;font-size:0.8rem;font-weight:500;color:var(--text2);margin-bottom:0.45rem}
.input-wrap{position:relative}
.input-icon{position:absolute;left:0.9rem;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none;transition:color 0.2s}
.input-wrap:focus-within .input-icon{color:var(--blue)}
.form-control{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:0.75rem 2.6rem;font-size:0.875rem;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border 0.2s}
.form-control::placeholder{color:var(--text3)}
.form-control:focus{border-color:var(--border2);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.toggle-pw{position:absolute;right:0.9rem;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text3);font-size:16px;background:none;border:none;padding:0;transition:color 0.2s}
.toggle-pw:hover{color:var(--text)}

/* Password strength */
.pw-strength{margin-top:0.5rem}
.strength-bar{display:flex;gap:4px;margin-bottom:0.3rem}
.sb{height:3px;border-radius:2px;flex:1;background:var(--bg3);transition:background 0.3s}
.strength-label{font-size:0.72rem;color:var(--text3)}

.btn-submit{width:100%;padding:0.875rem;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.25s;box-shadow:0 4px 24px rgba(59,130,246,0.3);display:flex;align-items:center;justify-content:center;gap:0.5rem}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(59,130,246,0.4)}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.spinner{width:18px;height:18px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.3);border-top-color:#fff;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error-msg{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:var(--r);padding:0.7rem 1rem;font-size:0.82rem;color:var(--red);margin-bottom:1rem;display:none;align-items:center;gap:0.5rem}
.error-msg.show{display:flex}
.success-msg{background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);border-radius:var(--r);padding:0.7rem 1rem;font-size:0.82rem;color:var(--green);margin-bottom:1rem;display:none;align-items:center;gap:0.5rem}
.success-msg.show{display:flex}

.back-link{display:flex;align-items:center;justify-content:center;gap:0.4rem;margin-top:1.5rem;font-size:0.82rem;color:var(--blue);text-decoration:none;transition:opacity 0.2s}
.back-link:hover{opacity:0.7}
</style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>
<div class="grid-bg"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">F</div>
    <span class="logo-text">FitCore ERP</span>
  </div>

  <div id="resetView">
    <div class="icon-circle">🔐</div>
    <div class="title">Set New Password</div>
    <div class="sub">Choose a strong password for your account.</div>

    <div id="resetError" class="error-msg"><i class="ti ti-alert-circle"></i> <span id="resetErrorMsg"></span></div>

    <div class="form-group">
      <label class="form-label">New Password</label>
      <div class="input-wrap">
        <i class="ti ti-lock input-icon"></i>
        <input type="password" id="newPw" class="form-control" placeholder="Min 8 chars with a number" oninput="checkStrength()" autocomplete="new-password"/>
        <button class="toggle-pw" onclick="togglePw('newPw',this)" type="button"><i class="ti ti-eye"></i></button>
      </div>
      <div class="pw-strength">
        <div class="strength-bar">
          <div class="sb" id="s1"></div>
          <div class="sb" id="s2"></div>
          <div class="sb" id="s3"></div>
          <div class="sb" id="s4"></div>
        </div>
        <div class="strength-label" id="strengthLabel">Enter a password</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <div class="input-wrap">
        <i class="ti ti-lock input-icon"></i>
        <input type="password" id="confirmPw" class="form-control" placeholder="Repeat your password" autocomplete="new-password"/>
        <button class="toggle-pw" onclick="togglePw('confirmPw',this)" type="button"><i class="ti ti-eye"></i></button>
      </div>
    </div>

    <button class="btn-submit" id="resetBtn" onclick="handleReset()">Set Password</button>
  </div>

  <div id="successView" style="display:none;text-align:center">
    <div class="icon-circle" style="background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.2)">✅</div>
    <div class="title">Password Updated!</div>
    <div class="sub" style="margin-bottom:2rem">Your password has been reset. You can now sign in.</div>
    <a href="login.html" class="btn-submit" style="text-decoration:none">Go to Sign In</a>
  </div>

  <a href="login.html" class="back-link"><i class="ti ti-arrow-left"></i> Back to Sign In</a>
</div>

<script>
const API = 'http://localhost:5000/api/v1';

// Get token from URL ?token=xxx
const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  document.getElementById('resetErrorMsg').textContent = 'Invalid or missing reset token.';
  document.getElementById('resetError').classList.add('show');
  document.getElementById('resetBtn').disabled = true;
}

function togglePw(id, btn) {
  const el = document.getElementById(id);
  const hide = el.type === 'password';
  el.type = hide ? 'text' : 'password';
  btn.innerHTML = hide ? '<i class="ti ti-eye-off"></i>' : '<i class="ti ti-eye"></i>';
}

function checkStrength() {
  const pw = document.getElementById('newPw').value;
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/\d/.test(pw)) score++;
  if (/[^a-zA-Z0-9]/.test(pw)) score++;
  const colors = ['#f87171','#fbbf24','#34d399','#22d3ee'];
  const labels = ['Weak','Fair','Good','Strong'];
  for (let i = 1; i <= 4; i++) {
    document.getElementById(`s${i}`).style.background = i <= score ? colors[score-1] : 'var(--bg3)';
  }
  document.getElementById('strengthLabel').textContent = pw ? labels[score-1] || 'Weak' : 'Enter a password';
  document.getElementById('strengthLabel').style.color = pw ? colors[score-1] : 'var(--text3)';
}

async function handleReset() {
  document.getElementById('resetError').classList.remove('show');
  const newPw = document.getElementById('newPw').value;
  const confirmPw = document.getElementById('confirmPw').value;
  if (!newPw || !confirmPw) return showErr('Please fill in both fields.');
  if (newPw !== confirmPw) return showErr('Passwords do not match.');
  if (newPw.length < 8) return showErr('Password must be at least 8 characters.');

  const btn = document.getElementById('resetBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';
  try {
    const res = await fetch(`${API}/auth/reset-password`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ token, password: newPw }),
    });
    const data = await res.json();
    if (!res.ok || !data.success) throw new Error(data.error || 'Reset failed.');
    document.getElementById('resetView').style.display = 'none';
    document.getElementById('successView').style.display = 'block';
  } catch(e) {
    showErr(e.message);
    btn.disabled = false;
    btn.innerHTML = 'Set Password';
  }
}

function showErr(msg) {
  document.getElementById('resetError').classList.add('show');
  document.getElementById('resetErrorMsg').textContent = msg;
}

/* ── MOUSE SPOTLIGHT EFFECT ──────────────────── */
document.querySelector('.card').addEventListener('mousemove', e => {
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  card.style.setProperty('--mouse-x', `${x}px`);
  card.style.setProperty('--mouse-y', `${y}px`);
});

/* ── SUPPRESS BROWSER EXTENSION NOISE ───────── */
window.addEventListener('unhandledrejection', event => {
  if (event.reason && (event.reason.message && event.reason.message.includes('message channel closed') || event.reason.toString().includes('message channel closed'))) {
    event.preventDefault();
  }
});
</script>
</body>
</html>
